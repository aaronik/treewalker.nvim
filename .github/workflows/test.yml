name: Tests

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ main ]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Neovim
      run: sudo snap install nvim --classic

    - name: Install Plenary
      run: |
        mkdir -p $HOME/.local/share/nvim/lazy/
        git clone https://github.com/nvim-lua/plenary.nvim.git
        mv plenary.nvim $HOME/.local/share/nvim/lazy/

    - name: Install nvim-treesitter
      run: |
        mkdir -p $HOME/.local/share/nvim/lazy/
        git clone --depth 1 --branch v0.10.0 https://github.com/nvim-treesitter/nvim-treesitter.git
        mv nvim-treesitter $HOME/.local/share/nvim/lazy/

    - name: Run luacheck type check / linter
      run: |
        sudo apt-get install lua-check -y --no-install-recommends
        make check

    - name: Check for errant util calls
      run: make no-utils

    - name: Check Parser Information
      run: |
        echo "=== Parser Information ==="
        make check-parsers
        echo ""
        echo "=== Saving Treesitter Trees ==="
        make save-trees
        echo ""
        echo "=== TypeScript Tree (first 50 lines) ==="
        head -50 ts_tree_local.txt
        echo ""
        echo "=== Java Tree (first 50 lines) ==="
        head -50 java_tree_local.txt

    - name: Run Tests
      run: make test

